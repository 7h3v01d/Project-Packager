[pytest]
testpaths = tests
addopts = -ra --strict-markers
markers =
    defect: outstanding work scheduled for the v3.1.0 consolidation release.
        These tests are also marked xfail(strict=True), so a normal `pytest`
        run is green and reports them as XFAIL. If one starts passing, the
        strict marker turns it into a failure so the marker gets removed
        rather than silently going stale.
