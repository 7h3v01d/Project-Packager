name: tests

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  tests:
    name: ${{ matrix.os }} / py${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest]
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dev dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt

      # Windows runners permit symlink creation, so the symlink containment
      # tests execute rather than skipping. Those cover the P0 privacy defect,
      # so a run where they silently skip is materially weaker.
      - name: Enable symlink support (Windows)
        if: runner.os == 'Windows'
        run: git config --global core.symlinks true

      # The whole suite, exactly as documented. Outstanding v3.1.0 work is
      # marked xfail(strict=True), so this passes with XFAILs — and a
      # fixed-but-still-marked test reports as a failure rather than a quiet
      # XPASS. Deliberately not split into an advisory job with
      # continue-on-error: that arrangement let CI stay green while the
      # documented `pytest` command failed and while markers went stale.
      - name: Full suite
        run: python -m pytest -rxX

  self_package:
    name: packages and verifies itself
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # End-to-end smoke test: the tool is its own most convenient real
      # project, and self-verification exercises manifest, sidecar, and
      # scanner paths that unit tests stub out.
      - name: Package this repository
        run: python project_packager.py package . --output ./_dist --name selftest

      - name: Verify the resulting archive
        run: python project_packager.py verify ./_dist/selftest_*.zip
